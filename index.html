<!DOCTYPE html>
<html lang="pt-BR">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Diário de Bordo PWA</title>

  <meta
    name="description"
    content="Aplicativo PWA Diário de Bordo para registro de atividades diárias."
  >

  <meta
    name="keywords"
    content="PWA, Diário, HTML, CSS, JavaScript"
  >

  <meta
    name="author"
    content="Ryan Levi"
  >

  <meta
    name="theme-color"
    content="#2563eb"
  >

  <link
    rel="manifest"
    href="manifest.json"
  >

  <link
    rel="stylesheet"
    href="style.css"
  >

</head>

<body>

  <main class="container">

    <h1>
      📘 Diário de Bordo
    </h1>

    <form id="form">

      <label for="titulo">
        Título
      </label>

      <input
        type="text"
        id="titulo"
        placeholder="Título"
        required
      >

      <label for="descricao">
        Descrição
      </label>

      <textarea
        id="descricao"
        placeholder="Descrição"
        required
      ></textarea>

      <label for="data">
        Data
      </label>

      <input
        type="date"
        id="data"
        required
      >

      <button type="submit">
        Adicionar
      </button>

    </form>

    <button
      id="installBtn"
      aria-label="Instalar aplicativo"
      hidden
    >
      Instalar Aplicativo
    </button>

    <div id="lista"></div>

  </main>

  <script src="script.js"></script>

</body>

</html>
